services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: unscripted
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    depends_on:
      - postgres
    ports:
      - "7233:7233"

  prometheus:
    image: prom/prometheus:v3.1.0
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    ports:
      - "9090:9090"
    volumes:
      - ./infra/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  loki:
    image: grafana/loki:3.4.1
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./infra/docker/loki/config.yml:/etc/loki/config.yml:ro

  tempo:
    image: grafana/tempo:2.7.1
    command: ["-config.file=/etc/tempo/config.yml"]
    ports:
      - "3200:3200"
      - "4317:4317"
    volumes:
      - ./infra/docker/tempo/config.yml:/etc/tempo/config.yml:ro

  grafana:
    image: grafana/grafana:11.5.2
    depends_on:
      - prometheus
      - loki
      - tempo
    ports:
      - "3002:3000"
    volumes:
      - ./infra/docker/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  postgres_data:
  redis_data:
  minio_data:
